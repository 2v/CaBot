; Copy this file to config.ini and fill in your keys.
[main]
; OpenAI API key — used for the differential diagnosis, the slideshow LLM, and text-to-speech.
OPENAI_API_KEY = sk-...

; Clinictron literature-search API token. Required for literature-grounded versions
; (v1, v1.1, vr1 all use the literature_search tool). Leave blank only if you disable the agent.
JWT_CLINICTRON =
