; Copy this file to config.ini and fill in your key.
[main]
; OpenAI API key — used for the differential diagnosis LLM, the literature-search query
; embeddings, the slideshow LLM, and text-to-speech. This single key covers everything.
OPENAI_API_KEY = sk-...

; Local PostgreSQL + pgvector literature database (optional; the default below is used
; if unset). Any libpq connection string works; env var PG_DSN is also accepted.
; The default matches the README setup (local peer/TCP auth, no password):
; PG_DSN = dbname=cabot_search host=localhost
; Add user=... password=... port=... only if your Postgres requires them.
